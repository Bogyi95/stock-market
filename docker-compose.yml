services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app1: &app
    build:
      context: ./app
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  app2:
    <<: *app

  app3:
    <<: *app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
      - app3
